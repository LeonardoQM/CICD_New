name: CICD_New

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Install pytest
        run: |
          pip install pytest

      - name: Run tests
        run: |
          pytest

      - name: Build Docker image
        run: |
          docker build -t leonardoq/hello-app:${IMAGE_TAG} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push leonardoq/hello-app:${IMAGE_TAG}

      - name: Update Kubernetes deployment
        run: |
          sed -i "s|image: leonardoq/hello-app:.*|image: leonardoq/hello-app:${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Verify deployment file
        run: |
          cat k8s/deployment.yaml

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit updated deployment
        run: |
          git add k8s/deployment.yaml
          git commit -m "Update image to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"

      - name: Push updated deployment
        run: |
          git push
