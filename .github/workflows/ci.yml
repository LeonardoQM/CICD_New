name: CICD_New

on:
  push:
    branches:
      - main

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -t hello-app:latest .

      - name: Check secrets length
        run: |
          echo "Username length:"
          echo -n "${{ secrets.DOCKER_USERNAME }}" | wc -c

          echo "Password length:"
          echo -n "${{ secrets.DOCKER_PASSWORD }}" | wc -c

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker tag hello-app:latest leonardoq/hello-app:latest
          docker push leonardoq/hello-app:latest
