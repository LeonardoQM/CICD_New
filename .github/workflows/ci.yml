name: CICD_New

on:
  push:
    branches:
      - main

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: |
          docker build -t leonardoq/hello-app:${IMAGE_TAG} .

      - name: Check secrets length
        run: |
          echo "Username length:"
          echo -n "${{ secrets.DOCKER_USERNAME }}" | wc -c

          echo "Password length:"
          echo -n "${{ secrets.DOCKER_PASSWORD }}" | wc -c

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push leonardoq/hello-app:${IMAGE_TAG}

      - name: Display image information
        run: |
          echo "Image pushed:"
          echo "leonardoq/hello-app:${IMAGE_TAG}"
